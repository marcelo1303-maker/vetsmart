<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>HORSESMART | Novo Atendimento</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        'vetsmart-green': '#2D5A4E',
                        'vetsmart-gold': '#D2B48C',
                        'vetsmart-gold-dark': '#C19A6B',
                    }
                }
            }
        }
    </script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #F0F5F3; }
        .glass-panel { background: rgba(255, 255, 255, 0.6); -webkit-backdrop-filter: blur(20px); backdrop-filter: blur(20px); border: 1px solid #2D5A4E; box-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.1); }
        .form-input { background-color: #f9fafb; border: 1px solid #d1d5db; border-radius: 10px; padding: 12px 16px; width: 100%; font-weight: 500; transition: all .2s; }
        .form-input:focus { border-color: #D2B48C; outline: none; box-shadow: 0 0 0 2px #d2b48c30; }
        .input-glass, .select-glass { background: rgba(240, 245, 243, 0.8); border: 2px solid transparent; border-radius: 12px; padding: 12px 16px; width: 100%; font-weight: 500; transition: all .2s; }
        .input-glass:focus, .select-glass:focus { border-color: #D2B48C; outline: none; }
        #cliente-modal { transition: opacity 0.3s ease-in-out; }
        #modal-content { transition: transform 0.3s ease-in-out; }
    </style>
</head>
<body class="pb-28">

    <header class="bg-vetsmart-green text-white sticky top-0 z-50 shadow-lg">
        <div class="max-w-md mx-auto flex items-center p-4">
            <a href="dashboard.html" class="text-white/80 hover:text-white"><i class="fa-solid fa-chevron-left text-xl"></i></a>
            <h1 class="font-black text-xl flex-grow text-center">NOVO <span class="text-vetsmart-gold">ATENDIMENTO</span></h1>
            <div class="w-8"></div>
        </div>
    </header>

    <main class="max-w-md mx-auto px-4 mt-4">

        <div class="glass-panel p-5 rounded-2xl mt-6">
            <label class="text-xs font-bold text-vetsmart-green uppercase tracking-wider">Buscar Animal</label>
            <div class="flex gap-2 mt-2">
                <input type="text" id="search-input" placeholder="Nome ou Cavalo..." class="form-input flex-1">
                <button class="bg-vetsmart-green text-white font-bold px-5 rounded-lg active:scale-95 transition-transform"><i class="fa-solid fa-magnifying-glass"></i></button>
            </div>
            <button id="btn-novo-cliente" class="w-full bg-vetsmart-gold hover:bg-vetsmart-gold-dark text-vetsmart-green font-black py-4 rounded-2xl shadow-lg active:scale-[0,98] transition-all flex itens-center justify-center gap-3 mt-3">
            <i class="fa-solid fa-plus-circle"></i> NOVO CADASTRO</button>

        </div>

        <div class="mt-4 pt-2 border-t border-vetsmart-green/10">
            <h2 class="font-bold text-vetsmart-green text-center uppercase text-sm tracking-wider">Sugestões</h2>
       </div>

       <div id="resultadosBusca" class="space-y-3">
        <div class="flex justify-center p-10"><i class="fa-solid fa-circle-notch animate-spin text-vetsmart-gold text-3xl"></i></div>
    </div>

    </main>

    <div id="cliente-modal" class="fixed inset-0 bg-black/40 z-[100] flex items-end justify-center opacity-0 pointer-events-none">
        <div id="modal-content" class="glass-panel w-full max-w-md rounded-t-3xl p-6 max-h-[90vh] overflow-y-auto translate-y-full">
            <form id="form-cliente" class="space-y-4">
                
                <div class="bg-vetsmart-green/5 p-4 rounded-2xl border border-vetsmart-green/10 mb-4">
                    <label class="text-[10px] font-black text-vetsmart-green uppercase mb-2 block">Verificar Base Global (CPF/CNPJ)</label>
                    <div class="flex gap-2">
                        <input type="text" id="global-search-doc" placeholder="Digite CPF ou CNPJ" class="input-glass text-sm">
                        <button type="button" id="btn-search-global" class="bg-vetsmart-green text-white px-4 rounded-xl active:scale-90 transition-all">
                            <i class="fa-solid fa-search"></i>
                        </button>
                    </div>
                    
                    <div id="global-results-box" class="mt-4 p-3 bg-white/50 rounded-xl border border-dashed border-vetsmart-gold/50 hidden">
                        <p class="text-[10px] font-bold text-vetsmart-gold uppercase mb-2">Cavalos Encontrados:</p>
                        <div id="horses-container" class="flex flex-wrap gap-2"></div>
                    </div>
                    <p id="global-msg" class="text-[10px] mt-2 font-bold hidden"></p>
                </div>

                <div>
                    <h4 class="font-bold text-vetsmart-green text-lg mb-2">Proprietário</h4>
                    <div class="space-y-3">
                        <select id="tipo-pessoa" name="tipo_pessoa" class="select-glass">
                            <option value="cpf">Pessoa Física (CPF)</option>
                            <option value="cnpj">Pessoa Jurídica (CNPJ)</option>
                        </select>
                        <div id="cpf-fields">
                            <input name="nome_proprietario" type="text" placeholder="Nome do Proprietário" class="input-glass w-full" required>
                            <input name="cpf" type="text" placeholder="CPF" class="input-glass w-full mt-3">
                        </div>
                        <div id="cnpj-fields" class="hidden">
                            <input name="razao_social" type="text" placeholder="Razão Social" class="input-glass w-full">
                            <input name="cnpj" type="text" placeholder="CNPJ" class="input-glass w-full mt-3">
                        </div>
                        <input name="telefone_proprietario" type="tel" placeholder="Telefone (WhatsApp)" class="input-glass">
                    </div>
                </div>

                <div>
                    <h4 class="font-bold text-vetsmart-green text-lg mb-2 mt-4">Cavalo</h4>
                    <div class="space-y-3">
                        <input name="nome_cavalo" type="text" placeholder="Nome do Cavalo" class="input-glass" required>
                        <input name="idade" type="number" placeholder="Idade" class="input-glass">
                        <select name="raca" class="select-glass">
                            <option value="" disabled selected>Selecione a Raça</option>
                            <option value="SRD">SRD (Sem Raça Definida)</option>
                            <option value="Brasileiro de Hipismo">Brasileiro de Hipismo</option>
                            <option value="Puro Sangue Ingles">Puro Sangue Inglês</option>
                            <option value="Lusitano">Lusitano</option>
                            <option value="Quarto de Milha">Quarto de Milha</option>
                            <option value="Mangalarga Marchador">Mangalarga Marchador</option>
                            <option value="Campolina">Campolina</option>
                            <option value="Crioulo">Crioulo</option>
                            <option value="Outros">Outros</option>
                        </select>
                        <input name="pelagem" type="text" placeholder="Pelagem" class="input-glass">
                        <input name="altura" type="text" placeholder="Altura (ex: 1.65m)" class="input-glass">
                        <select name="sexo_cavalo" class="select-glass">
                            <option value="" disabled selected>Selecione o Sexo</option>
                            <option value="Fêmea">Fêmea</option>
                            <option value="Macho Castrado">Macho Castrado</option>
                            <option value="Garanhão">Garanhão</option>
                        </select>
                    </div>
                </div>

                <button type="submit" id="save-cliente-btn" class="w-full bg-vetsmart-gold hover:bg-vetsmart-gold-dark text-vetsmart-green font-black py-4 rounded-2xl uppercase tracking-widest active:scale-95 transition-all mt-4 shadow-lg">Salvar e Atender</button>
                <button type="button" id="btn-cancel-modal" class="w-full text-center text-sm text-gray-500 py-2 mt-2">Cancelar</button>
            </form>
        </div>
    </div>

    <nav class="fixed bottom-0 left-0 right-0 z-50">
        <div class="max-w-md mx-auto p-2">
            <div class="glass-panel rounded-2xl px-4 py-3 flex justify-between items-center">
                 <a href="dashboard.html" class="flex flex-col items-center text-vetsmart-green/90 hover:text-vetsmart-green transition-all">
                    <i class="fa-solid fa-house text-lg"></i>
                    <span class="text-[10px] mt-1">Início</span>
                </a>
                <a href="novo-atendimento_1775208974082.html" class="flex flex-col items-center text-vetsmart-gold font-bold transition-all">
                    <i class="fa-solid fa-notes-medical text-lg"></i>
                    <span class="text-[10px] mt-1">Atender</span>
                </a>
                <a href="clientes.html" class="flex flex-col items-center text-vetsmart-green/90 hover:text-vetsmart-green transition-all">
                    <i class="fa-solid fa-horse text-lg"></i>
                    <span class="text-[10px] mt-1">Cavalos</span>
                </a>
                <a href="financeiro.html" class="flex flex-col items-center text-vetsmart-green/90 hover:text-vetsmart-green transition-all">
                    <i class="fa-solid fa-dollar-sign text-lg"></i>
                    <span class="text-[10px] mt-1">Caixa</span>
                </a>
                <a href="atendimentos.html" class="flex flex-col items-center text-vetsmart-green/90 hover:text-vetsmart-green transition-all">
                    <i class="fa-solid fa-calendar-check text-lg"></i>
                    <span class="text-[10px] mt-1">Atendimentos</span>
                </a>
                <a href="estoque.html" class="flex flex-col items-center text-vetsmart-green/90 hover:text-vetsmart-green transition-all">
                    <i class="fa-solid fa-box-open text-lg"></i>
                    <span class="text-[10px] mt-1">Estoque</span>
                </a>
            </div>
        </div>
    </nav>

    <script type="module">
        import { auth, db } from "./firebase.js";
        import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { collection, query, where, getDocs, addDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        let currentUser = null;
        let allClientes = [];

        const clienteModal  = document.getElementById('cliente-modal');
        const modalContent  = document.getElementById('modal-content');
        const formCliente   = document.getElementById('form-cliente');
        const searchInput   = document.getElementById('search-input');
        const resultados    = document.getElementById('resultadosBusca');

        // ── Modal de novo cadastro ───────────────────────────────────────
        const openClienteModal = () => {
            formCliente.reset();
            document.getElementById('cpf-fields').classList.remove('hidden');
            document.getElementById('cnpj-fields').classList.add('hidden');
            document.getElementById('global-results-box').classList.add('hidden');
            document.getElementById('global-msg').classList.add('hidden');
            clienteModal.classList.remove('opacity-0', 'pointer-events-none');
            modalContent.classList.remove('translate-y-full');
        };
        const closeClienteModal = () => {
            clienteModal.classList.add('opacity-0', 'pointer-events-none');
            modalContent.classList.add('translate-y-full');
            formCliente.reset();
        };

        document.getElementById('btn-novo-cliente').addEventListener('click', openClienteModal);
        document.getElementById('btn-cancel-modal').addEventListener('click', closeClienteModal);
        clienteModal.addEventListener('click', e => e.target === clienteModal && closeClienteModal());

        // Toggle CPF/CNPJ no modal
        document.getElementById('tipo-pessoa').addEventListener('change', (e) => {
            document.getElementById('cpf-fields').classList.toggle('hidden', e.target.value !== 'cpf');
            document.getElementById('cnpj-fields').classList.toggle('hidden', e.target.value !== 'cnpj');
        });

        // ── Auth + carga de dados ────────────────────────────────────────
        onAuthStateChanged(auth, async user => {
            if (user) {
                currentUser = user;
                await carregarClientes(user.uid);
                renderCards(allClientes.slice(0, 6));
            } else {
                window.location.replace('login.html');
            }
        });

        async function carregarClientes(uid) {
            try {
                const q = query(collection(db, "clientes"), where("userId", "==", uid));
                const snap = await getDocs(q);
                allClientes = snap.docs
                    .map(d => ({ id: d.id, ...d.data() }))
                    .sort((a, b) => (a.nome_cavalo || '').localeCompare(b.nome_cavalo || '', 'pt-BR'));
            } catch (err) {
                console.error("Erro ao carregar clientes:", err);
                allClientes = [];
            }
        }

        // ── Busca local ──────────────────────────────────────────────────
        searchInput.addEventListener('input', () => {
            const term = searchInput.value.trim().toLowerCase();
            if (!term) { renderCards(allClientes.slice(0, 6)); return; }
            const matches = allClientes.filter(c =>
                (c.nome_cavalo || '').toLowerCase().includes(term) ||
                (c.nome_proprietario || '').toLowerCase().includes(term) ||
                (c.horseId || '').toLowerCase().includes(term)
            );
            renderCards(matches);
        });

        // Botão da lupa
        document.querySelector('.glass-panel button').addEventListener('click', () => {
            searchInput.dispatchEvent(new Event('input'));
        });

        function escapeHTML(str) {
            const d = document.createElement('div');
            d.appendChild(document.createTextNode(String(str || '')));
            return d.innerHTML;
        }

        function renderCards(list) {
            if (!list.length) {
                resultados.innerHTML = '<p class="text-center text-vetsmart-green/70 py-6">Nenhum cavalo encontrado.</p>';
                return;
            }
            resultados.innerHTML = '';
            list.forEach(c => {
                const div = document.createElement('div');
                div.className = 'glass-panel p-4 rounded-xl border border-vetsmart-gold/30 cursor-pointer hover:bg-vetsmart-gold/5 transition-all flex items-center gap-4';
                div.setAttribute('data-id', c.id);
                div.innerHTML = `
                    <div class="w-10 h-10 rounded-xl bg-vetsmart-green/10 flex items-center justify-center text-vetsmart-green flex-shrink-0">
                        <i class="fa-solid fa-horse"></i>
                    </div>
                    <div class="flex-1 min-w-0">
                        <p class="font-bold text-vetsmart-green uppercase leading-tight truncate">${escapeHTML(c.nome_cavalo)}</p>
                        <p class="text-xs text-vetsmart-green/70 truncate">${escapeHTML(c.nome_proprietario || 'N/A')}</p>
                    </div>
                    <span class="text-[9px] font-mono bg-vetsmart-gold/10 px-2 py-1 rounded-lg text-vetsmart-gold-dark font-bold flex-shrink-0">${escapeHTML(c.horseId || '')}</span>
                `;
                div.addEventListener('click', () => goToAtendimento(c.id));
                resultados.appendChild(div);
            });
        }

        window.goToAtendimento = (clienteId) => {
            window.location.href = `modelo_atendimentos.html?horseId=${clienteId}`;
        };

        // ── Formulário de novo cadastro ──────────────────────────────────
        formCliente.addEventListener('submit', async (e) => {
            e.preventDefault();
            const saveBtn = document.getElementById('save-cliente-btn');
            saveBtn.disabled = true;
            saveBtn.innerHTML = '<i class="fa-solid fa-spinner fa-spin mr-2"></i>Salvando...';

            const fd = new FormData(formCliente);
            const nomeCavalo = (fd.get('nome_cavalo') || '').trim();
            if (!nomeCavalo) {
                alert("Informe o nome do cavalo.");
                saveBtn.disabled = false; saveBtn.innerHTML = 'Salvar e Atender'; return;
            }

            const clienteData = {
                userId: currentUser.uid,
                timestamp: serverTimestamp(),
                nome_proprietario: (fd.get('nome_proprietario') || '').trim(),
                cpf: (fd.get('cpf') || '').replace(/\D/g, '') || null,
                telefone_proprietario: fd.get('telefone_proprietario') || null,
                nome_cavalo: nomeCavalo,
                idade: fd.get('idade') || null,
                raca: fd.get('raca') || null,
                pelagem: fd.get('pelagem') || null,
                altura: fd.get('altura') || null,
                sexo_cavalo: fd.get('sexo_cavalo') || null,
                horseId: `VS-${Date.now().toString().slice(-6)}`
            };

            try {
                const docRef = await addDoc(collection(db, "clientes"), clienteData);
                window.location.href = `modelo_atendimentos.html?horseId=${docRef.id}`;
            } catch (err) {
                console.error("Erro ao salvar:", err);
                alert("Falha ao salvar. Tente novamente.");
                saveBtn.disabled = false; saveBtn.innerHTML = 'Salvar e Atender';
            }
        });
    </script>
</body>
</html>
