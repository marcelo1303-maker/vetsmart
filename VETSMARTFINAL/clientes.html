<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>HORSESMART | Clientes e Cavalos</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        'vetsmart-green': '#2D5A4E',
                        'vetsmart-gold': '#D2B48C',
                        'vetsmart-gold-dark': '#C19A6B',
                    }
                }
            }
        }
    </script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #F0F5F3; }
        .glass-panel { background: rgba(255, 255, 255, 0.6); -webkit-backdrop-filter: blur(20px); backdrop-filter: blur(20px); border: 1px solid #2D5A4E; box-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.1); }
        .input-glass, .select-glass { background: rgba(240, 245, 243, 0.8); border: 2px solid transparent; border-radius: 12px; padding: 12px 16px; width: 100%; font-weight: 500; transition: all .2s; }
        .input-glass:focus, .select-glass:focus { border-color: #D2B48C; outline: none; }
        .form-input { background-color: #f9fafb; border: 1px solid #d1d5db; border-radius: 10px; padding: 12px 16px; width: 100%; font-weight: 500; transition: all .2s; }
        .form-input:focus { border-color: #D2B48C; outline: none; box-shadow: 0 0 0 2px #d2b48c30; }
        #cliente-modal { transition: opacity 0.3s ease-in-out; }
        #modal-content { transition: transform 0.3s ease-in-out; }
        .horse-pill { cursor: pointer; transition: all 0.2s; border: 1px solid transparent; }
        .horse-pill:hover { border-color: #D2B48C; background: #FFF; scale: 1.05; }
    </style>
</head>
<body class="pb-28">

    <header class="bg-vetsmart-green text-white sticky top-0 z-50 shadow-lg">
        <div class="max-w-md mx-auto flex justify-between items-center p-4">
            <a href="dashboard.html" class="text-white/80 hover:text-white"><i class="fa-solid fa-chevron-left text-xl"></i></a>
            <h1 class="font-black text-2xl tracking-tight absolute left-1/2 -translate-x-1/2 uppercase">GESTÃO <span class="text-vetsmart-gold">EQUINA</span></h1>
            <div class="w-8"></div>
        </div>
    </header>

    <main class="max-w-md mx-auto px-4 mt-4">
        
        <div class="glass-panel p-5 rounded-2xl mt-6">
            <label class="text-xs font-bold text-vetsmart-green uppercase tracking-wider">Buscar em Meus Clientes</label>
            <div class="flex gap-2 mt-2">
                <input type="text" id="search-input" placeholder="Nome do Cliente ou Cavalo..." class="form-input flex-1">
                <button class="bg-vetsmart-green text-white font-bold px-5 rounded-lg active:scale-95 transition-transform"><i class="fa-solid fa-magnifying-glass"></i></button>
            </div>
            <button id="btn-novo-cliente" class="w-full bg-vetsmart-gold hover:bg-vetsmart-gold-dark text-vetsmart-green font-black py-4 rounded-2xl shadow-lg active:scale-[0,98] transition-all flex itens-center justify-center gap-3 mt-3">
            <i class="fa-solid fa-plus-circle"></i>NOVO CADASTRO</button>

        </div>

        <div class="mt-4 pt-2 border-t border-vetsmart-green/10">
             <h2 class="font-bold text-vetsmart-green text-center uppercase text-sm tracking-wider">Meus Cavalos</h2>
        </div>

        <div id="lista-clientes" class="space-y-3">
            <div class="flex justify-center p-10"><i class="fa-solid fa-circle-notch animate-spin text-vetsmart-gold text-3xl"></i></div>
        </div>
    </main>

    <div id="cliente-modal" class="fixed inset-0 bg-black/40 z-[100] flex items-end justify-center opacity-0 pointer-events-none">
        <div id="modal-content" class="glass-panel w-full max-w-md rounded-t-3xl p-6 max-h-[90vh] overflow-y-auto translate-y-full">
            <form id="form-cliente" class="space-y-4">
                
                <div class="bg-vetsmart-green/5 p-4 rounded-2xl border border-vetsmart-green/10 mb-4">
                    <label class="text-[10px] font-black text-vetsmart-green uppercase mb-2 block">Verificar Base Global (CPF/CNPJ)</label>
                    <div class="flex gap-2">
                        <input type="text" id="global-search-doc" placeholder="Digite CPF ou CNPJ" class="input-glass text-sm">
                        <button type="button" id="btn-search-global" class="bg-vetsmart-green text-white px-4 rounded-xl active:scale-90 transition-all"><i class="fa-solid fa-search"></i></button>
                    </div>
                    
                    <div id="global-results-box" class="mt-4 p-3 bg-white/50 rounded-xl border border-dashed border-vetsmart-gold/50 hidden">
                        <p class="text-[10px] font-bold text-vetsmart-gold uppercase mb-2"><i class="fa-solid fa-list-check mr-1"></i> Resultados Encontrados</p>
                        <div id="horses-container" class="flex flex-wrap gap-2">
                            </div>
                    </div>

                    <p id="global-msg" class="text-[10px] mt-2 font-bold hidden"></p>
                </div>

                <div>
                    <h4 class="font-bold text-vetsmart-green text-lg mb-2">Proprietário</h4>
                    <div class="space-y-3">
                        <select id="tipo-pessoa" name="tipo_pessoa" class="select-glass">
                            <option value="cpf">Pessoa Física (CPF)</option>
                            <option value="cnpj">Pessoa Jurídica (CNPJ)</option>
                        </select>
                        <div id="cpf-fields">
                            <input name="nome_proprietario" type="text" placeholder="Nome do Proprietário" class="input-glass w-full" required>
                            <input name="cpf" id="input-cpf" type="text" placeholder="CPF" class="input-glass w-full mt-3">
                        </div>
                        <div id="cnpj-fields" class="hidden">
                            <input name="razao_social" type="text" placeholder="Razão Social" class="input-glass w-full">
                            <input name="cnpj" id="input-cnpj" type="text" placeholder="CNPJ" class="input-glass w-full mt-3">
                        </div>
                        <input name="telefone_proprietario" type="tel" placeholder="Telefone (WhatsApp)" class="input-glass">
                        <input id="cep" name="cep" type="text" placeholder="CEP" class="input-glass">
                        <div class="grid grid-cols-3 gap-2">
                            <input name="logradouro" type="text" placeholder="Rua" class="input-glass col-span-2" readonly>
                            <input name="numero" type="text" placeholder="Nº" class="input-glass">
                        </div>
                        <input name="bairro" type="text" placeholder="Bairro" class="input-glass" readonly>
                        <input name="cidade" type="text" placeholder="Cidade" class="input-glass" readonly>
                        <input name="uf" type="text" placeholder="Estado" class="input-glass" readonly>
                    </div>
                </div>

                <div>
                    <h4 class="font-bold text-vetsmart-green text-lg mb-2 mt-4">Cavalo</h4>
                    <div class="space-y-3">
                        <input name="nome_cavalo" type="text" placeholder="Nome do Cavalo" class="input-glass" required>
                        <input name="idade" type="number" placeholder="Idade" class="input-glass">
                        <select name="raca" class="select-glass">
                            <option value="" disabled selected>Selecione a Raça</option>
                            <option value="SRD">SRD (Sem Raça Definida)</option>
                            <option value="Brasileiro de Hipismo">Brasileiro de Hipismo</option>
                            <option value="Quarto de Milha">Quarto de Milha</option>
                            <option value="Crioulo">Crioulo</option>
                            <option value="Lusitano">Lusitano</option>
                            <option value="Puro Sangue Ingles">Puro Sangue Inglês</option>
                            <option value="Mangalarga Marchador">Mangalarga Marchador</option>
                            <option value="Campolina">Campolina</option>
                            <option value="Outro">Outro</option>
                        </select>
                        <input name="pelagem" type="text" placeholder="Pelagem" class="input-glass">
                        <input name="altura" type="number" placeholder="Altura (ex: 1.65m)" class="input-glass">
                        <select name="sexo_cavalo" class="select-glass">
                            <option value="" disabled selected>Selecione o Sexo</option>
                            <option value="Fêmea">Fêmea</option>
                            <option value="Macho Castrado">Macho Castrado</option>
                            <option value="Garanhão">Garanhão</option>
                        </select>
                    </div>
                </div>

                <button type="submit" id="save-cliente-btn" class="w-full bg-vetsmart-gold hover:bg-vetsmart-gold-dark text-vetsmart-green font-black py-4 rounded-2xl uppercase tracking-widest active:scale-95 transition-all mt-4 shadow-lg">Salvar Cadastro</button>
                <button type="button" id="btn-cancel" class="w-full text-center text-sm text-gray-500 py-2 mt-2">Cancelar</button>
            </form>
        </div>
    </div>
    <script type="module">

        import { auth, db } from "./firebase.js";
        import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { collection, query, where, onSnapshot, addDoc, doc, setDoc, getDoc, serverTimestamp, orderBy } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        // D2: escapeHTML — protege contra XSS em interpolações de dados Firestore
        function escapeHTML(s) {
            if (s == null) return '';
            return String(s)
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/"/g, '&quot;')
                .replace(/'/g, '&#39;')
                .replace(/\//g, '&#x2F;');
        }

        let currentUser;
        let allClients = [];
        const _globalPropDataStore = new Map();

        const btnNovoCliente = document.getElementById('btn-novo-cliente');
        const clienteModal = document.getElementById('cliente-modal');
        const modalContent = document.getElementById('modal-content');
        const formCliente = document.getElementById('form-cliente');
        const listaClientes = document.getElementById('lista-clientes');
        const searchInput = document.getElementById('search-input');
        const tipoPersona = document.getElementById('tipo-pessoa');
        const cpfFields = document.getElementById('cpf-fields');
        const cnpjFields = document.getElementById('cnpj-fields');
        const cepInput = document.getElementById('cep');
        const globalSearchDoc = document.getElementById('global-search-doc');
        const btnSearchGlobal = document.getElementById('btn-search-global');
        const globalResultsBox = document.getElementById('global-results-box');
        const horsesContainer = document.getElementById('horses-container');
        const globalMsg = document.getElementById('global-msg');
        const btnCancel = document.getElementById('btn-cancel');


        const openModal = () => {
            formCliente.reset(); // Resetar formulário ao abrir
            globalResultsBox.classList.add('hidden'); // Esconder resultados globais
            globalMsg.classList.add('hidden'); // Esconder mensagens globais
            clienteModal.classList.remove('opacity-0', 'pointer-events-none');
            modalContent.classList.remove('translate-y-full');
        };

        const closeModal = () => {
            modalContent.classList.add('translate-y-full');
            clienteModal.classList.add('opacity-0', 'pointer-events-none');
            formCliente.reset();
        };

        btnNovoCliente.addEventListener('click', openModal);
        clienteModal.addEventListener('click', (e) => { if (e.target === clienteModal) closeModal(); });
        btnCancel.addEventListener('click', closeModal); // Adiciona funcionalidade ao botão Cancelar

        // Toggle CPF/CNPJ
        tipoPersona.addEventListener('change', (e) => {
            if (e.target.value === 'cpf') {
                cpfFields.classList.remove('hidden');
                cnpjFields.classList.add('hidden');
                // Limpar campos CNPJ ao mudar para CPF
                document.querySelector('input[name="razao_social"]').value = '';
                document.getElementById('input-cnpj').value = '';
            } else {
                cpfFields.classList.add('hidden');
                cnpjFields.classList.remove('hidden');
                // Limpar campos CPF ao mudar para CNPJ
                document.querySelector('input[name="nome_proprietario"]').value = '';
                document.getElementById('input-cpf').value = '';
            }
        });

        // ViaCEP
        cepInput.addEventListener('blur', async () => {
            const cep = cepInput.value.replace(/\D/g, '');
            if (cep.length !== 8) return;
            try {
                const res = await fetch(`https://viacep.com.br/ws/${cep}/json/`);
                const data = await res.json();
                if (!data.erro) {
                    document.querySelector('input[name="logradouro"]').value = data.logradouro;
                    document.querySelector('input[name="bairro"]').value = data.bairro;
                    document.querySelector('input[name="cidade"]').value = data.localidade;
                    document.querySelector('input[name="uf"]').value = data.uf;
                }
            } catch (err) { console.error("Erro ao buscar CEP:", err); }
        });

        // Função para preencher o formulário com dados do proprietário global
        const fillFormWithProprietarioData = (data) => {
            if (data.tipo_pessoa === 'cpf') {
                tipoPersona.value = 'cpf';
                cpfFields.classList.remove('hidden');
                cnpjFields.classList.add('hidden');
                document.querySelector('input[name="nome_proprietario"]').value = data.nome_proprietario || '';
                document.getElementById('input-cpf').value = data.cpf || '';
            } else if (data.tipo_pessoa === 'cnpj') {
                tipoPersona.value = 'cnpj';
                cpfFields.classList.add('hidden');
                cnpjFields.classList.remove('hidden');
                document.querySelector('input[name="razao_social"]').value = data.nome_proprietario || ''; // Assumindo nome_proprietario para razao_social aqui
                document.getElementById('input-cnpj').value = data.cnpj || '';
            }
            document.querySelector('input[name="telefone_proprietario"]').value = data.telefone || '';
            // CEP e endereço não vêm na busca global, precisaria de outro fetch se necessário
        };

        // Busca Global (proprietarios_globais por CPF/CNPJ)
        btnSearchGlobal.addEventListener('click', async () => {
            const docLimpo = globalSearchDoc.value.replace(/\D/g, '');
            if (docLimpo.length < 11) {
                globalMsg.textContent = 'CPF/CNPJ inválido ou incompleto.';
                globalMsg.classList.remove('hidden');
                globalResultsBox.classList.add('hidden');
                return;
            }
            try {
                // Busca direta pelo ID do documento
                const docRef = doc(db, "proprietarios_globais", docLimpo);
                const snap = await getDoc(docRef);

                if (!snap.exists()) {
                    globalMsg.textContent = 'Proprietário não encontrado na base global.';
                    globalMsg.classList.remove('hidden');
                    globalResultsBox.classList.add('hidden');
                    horsesContainer.innerHTML = ''; // Limpa resultados anteriores
                    return;
                }
                const propData = snap.data();

                // Armazena dados no Map para evitar XSS via onclick inline
                _globalPropDataStore.set(docLimpo, propData);

                const nomeSafe = document.createElement('div');
                nomeSafe.textContent = propData.nome_proprietario || 'Nome não informado';

                const pill = document.createElement('div');
                pill.className = 'horse-pill glass-panel rounded-2xl p-3 text-center text-sm w-full';
                pill.dataset.docId = docLimpo;
                pill.innerHTML = `
                    <p class="font-bold text-vetsmart-green"></p>
                    <p class="text-[10px] text-vetsmart-green/80">${propData.tipo_pessoa === 'cpf' ? 'Pessoa Física' : 'Pessoa Jurídica'}</p>
                    <button type="button" class="mt-2 text-vetsmart-gold-dark text-xs font-bold">Usar este proprietário</button>
                `;
                pill.querySelector('p.font-bold').textContent = propData.nome_proprietario || 'Nome não informado';
                pill.addEventListener('click', () => {
                    const stored = _globalPropDataStore.get(docLimpo);
                    if (stored) fillFormWithProprietarioData(stored);
                    closeModal();
                });

                horsesContainer.innerHTML = '';
                horsesContainer.appendChild(pill);
                globalMsg.classList.add('hidden');
                globalResultsBox.classList.remove('hidden');

            } catch (err) {
                console.error("Erro ao buscar proprietário:", err);
                globalMsg.textContent = 'Erro ao buscar proprietário. Tente novamente.';
                globalMsg.classList.remove('hidden');
                globalResultsBox.classList.add('hidden');
                horsesContainer.innerHTML = '';
            }
        });

        onAuthStateChanged(auth, (user) => {
            if (user) {
                currentUser = user;
                setupClientListener(user.uid);
            } else {
                window.location.replace('login.html');
            }
        });

        function setupClientListener(uid) {
            const q = query(collection(db, "clientes"), where("userId", "==", uid));
            onSnapshot(q, (snapshot) => {
                allClients = snapshot.docs
                    .map(d => ({ id: d.id, ...d.data() }))
                    .sort((a, b) => (a.nome_cavalo || '').localeCompare(b.nome_cavalo || '', 'pt-BR'));
                renderClients(allClients);
            }, (err) => {
                console.error("Erro ao carregar clientes:", err);
                document.getElementById('lista-clientes').innerHTML = '<div class="p-6 text-center text-red-500">Erro ao carregar dados. Tente recarregar a página.</div>';
            });
        }

        function renderClients(clients) {
            listaClientes.innerHTML = clients.length
                ? ''
                : '<div class="p-8 text-center text-vetsmart-green/80">Nenhum cavalo cadastrado.</div>';

            clients.forEach(client => {
                listaClientes.innerHTML += `
                    <a href="dossie.html?id=${escapeHTML(client.id)}" class="block bg-white p-4 rounded-2xl shadow-sm flex items-center gap-4 active:scale-[0.98] transition-all mb-3 border border-vetsmart-green/5">
                        <div class="w-12 h-12 rounded-2xl bg-vetsmart-green/5 flex items-center justify-center text-vetsmart-green">
                            <i class="fa-solid fa-horse text-xl"></i>
                        </div>
                        <div class="flex-1">
                            <p class="font-black text-vetsmart-green uppercase leading-tight">${escapeHTML(client.nome_cavalo)}</p>
                            <p class="text-[10px] text-gray-400 font-bold uppercase tracking-wider">${escapeHTML(client.nome_proprietario || 'Proprietário')}</p>
                        </div>
                        <div class="text-right">
                            <span class="text-[9px] font-mono bg-vetsmart-gold/10 p-1 px-2 rounded-lg block mb-1 text-vetsmart-gold-dark font-bold">${escapeHTML(client.horseId || 'S/ID')}</span>
                            <i class="fa-solid fa-chevron-right text-vetsmart-green/20 text-xs"></i>
                        </div>
                    </a>
                `;
            });
        }

        const generateID = () => {
            const L = "ABCDEFGHIJKLMNOPQRSTUVWXYZ", N = "0123456789";
            let r = '';
            for (let i = 0; i < 3; i++) r += L[Math.floor(Math.random() * 26)];
            r += '-';
            for (let i = 0; i < 4; i++) r += N[Math.floor(Math.random() * 10)];
            return r;
        };

        formCliente.onsubmit = async (e) => {
            e.preventDefault();
            const saveBtn = document.getElementById('save-cliente-btn');
            saveBtn.disabled = true;
            saveBtn.innerText = "SALVANDO...";

            const formData = new FormData(formCliente);

            // --- Validação do Formulário (Melhorada) ---
            const nomeCavalo = formData.get('nome_cavalo').trim();
            if (!nomeCavalo) {
                alert("Por favor, preencha o nome do cavalo.");
                saveBtn.disabled = false;
                saveBtn.innerText = "Salvar Cadastro";
                return;
            }

            let nomeProprietario = '';
            let documentoProprietario = '';
            const tipoPessoa = formData.get('tipo_pessoa');

            if (tipoPessoa === 'cpf') {
                nomeProprietario = formData.get('nome_proprietario').trim();
                documentoProprietario = (formData.get('cpf') || '').replace(/\D/g, '');
                if (!nomeProprietario) {
                    alert("Por favor, preencha o Nome do Proprietário.");
                    saveBtn.disabled = false;
                    saveBtn.innerText = "Salvar Cadastro";
                    return;
                }
                if (documentoProprietario.length > 0 && documentoProprietario.length !== 11) {
                    alert("CPF inválido. Deve ter 11 dígitos ou deixe em branco.");
                    saveBtn.disabled = false;
                    saveBtn.innerText = "Salvar Cadastro";
                    return;
                }
            } else if (tipoPessoa === 'cnpj') {
                nomeProprietario = formData.get('razao_social').trim();
                documentoProprietario = (formData.get('cnpj') || '').replace(/\D/g, '');
                if (!nomeProprietario) {
                    alert("Por favor, preencha a Razão Social.");
                    saveBtn.disabled = false;
                    saveBtn.innerText = "Salvar Cadastro";
                    return;
                }
                if (documentoProprietario.length > 0 && documentoProprietario.length !== 14) {
                    alert("CNPJ inválido. Deve ter 14 dígitos ou deixe em branco.");
                    saveBtn.disabled = false;
                    saveBtn.innerText = "Salvar Cadastro";
                    return;
                }
            }

            const clientData = {
                userId: currentUser.uid,
                horseId: generateID(), // Mantendo geração de ID aleatória para horseId
                nome_cavalo: nomeCavalo,
                nome_proprietario: nomeProprietario,
                tipo_pessoa: tipoPessoa, // Adicionado para consistência
                cpf_cnpj: documentoProprietario,
                telefone_proprietario: formData.get('telefone_proprietario'),
                raca: formData.get('raca'),
                pelagem: formData.get('pelagem'),
                idade: formData.get('idade'),
                altura: formData.get('altura'),
                sexo_cavalo: formData.get('sexo_cavalo'),
                cep: formData.get('cep').replace(/\D/g, ''),
                logradouro: formData.get('logradouro'),
                numero: formData.get('numero'),
                bairro: formData.get('bairro'),
                cidade: formData.get('cidade'),
                uf: formData.get('uf'),
                createdAt: serverTimestamp(),
                ultimaAtualizacao: serverTimestamp()
            };

            try {
                await addDoc(collection(db, "clientes"), clientData);

                // Indexação global por CPF/CNPJ (apenas se informado)
                if (documentoProprietario.length >= 11) {
                    await setDoc(doc(db, "proprietarios_globais", documentoProprietario), {
                        nome_proprietario: nomeProprietario,
                        tipo_pessoa: tipoPessoa,
                        telefone: clientData.telefone_proprietario,
                        updatedAt: serverTimestamp()
                    }, { merge: true });
                }

                closeModal();
            } catch (err) {
                console.error(err);
                alert("Erro ao salvar cadastro.");
            } finally {
                saveBtn.disabled = false;
                saveBtn.innerText = "Salvar Cadastro";
            }
        };

        searchInput.oninput = (e) => {
            const term = e.target.value.toLowerCase();
            const filtered = allClients.filter(c =>
                c.nome_cavalo.toLowerCase().includes(term) ||
                (c.nome_proprietario && c.nome_proprietario.toLowerCase().includes(term))
            );
            renderClients(filtered);
        };

        // Expondo a função globalmente para uso no HTML (se necessário para onclicks diretos)
        window.fillFormWithProprietarioData = fillFormWithProprietarioData;
    
    </script>
</body>
</html>

                <i class="fa-solid fa-house text-lg"></i>
                <span class="text-[10px] mt-1">Início</span>
            </a>
            <a href="novo-atendimento_1775208974082.html" class="flex flex-col items-center text-vetsmart-green/80 hover:text-vetsmart-green transition-all">
                <i class="fa-solid fa-notes-medical text-lg"></i>
