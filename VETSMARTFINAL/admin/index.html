<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HorseSmart | Admin</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script>
        tailwind.config = {
            theme: { extend: { colors: { gold: '#D2B48C', 'gold-dark': '#C19A6B', green: '#2D5A4E' } } }
        }
    </script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;800&display=swap');
        body { font-family: 'Poppins', sans-serif; background: #0D1B18; }
        .glass { background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.08); backdrop-filter: blur(20px); }
        input:-webkit-autofill { -webkit-box-shadow: 0 0 0 100px #1E3530 inset; -webkit-text-fill-color: #F0F5F3; }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-6">
    <div class="w-full max-w-sm">
        <div class="text-center mb-10">
            <div class="inline-flex items-center justify-center w-16 h-16 rounded-2xl bg-green/20 border border-green/30 mb-4">
                <i class="fa-solid fa-horse text-gold text-2xl"></i>
            </div>
            <h1 class="text-2xl font-black text-white tracking-tight">HORSE<span class="text-gold">SMART</span></h1>
            <p class="text-white/40 text-xs mt-1 uppercase tracking-widest">Portal Administrador</p>
        </div>

        <div class="glass rounded-3xl p-8 space-y-5">
            <div>
                <label class="block text-white/50 text-xs uppercase tracking-widest mb-2">Usuário</label>
                <input type="text" id="username" placeholder="admin"
                    class="w-full bg-white/5 border border-white/10 text-white rounded-xl py-3.5 px-4 focus:outline-none focus:border-gold/50 transition-colors"
                    autocomplete="username">
            </div>
            <div>
                <label class="block text-white/50 text-xs uppercase tracking-widest mb-2">Senha de Acesso</label>
                <div class="relative">
                    <input type="password" id="password" placeholder="••••••••••••"
                        class="w-full bg-white/5 border border-white/10 text-white rounded-xl py-3.5 px-4 pr-10 focus:outline-none focus:border-gold/50 transition-colors"
                        autocomplete="current-password">
                    <button type="button" id="toggle-pwd" class="absolute right-3 top-1/2 -translate-y-1/2 text-white/30 hover:text-white/60 transition-colors">
                        <i class="fa-solid fa-eye text-sm"></i>
                    </button>
                </div>
            </div>

            <div id="error-msg" class="hidden bg-red-500/10 border border-red-500/30 text-red-400 text-sm rounded-xl px-4 py-3"></div>

            <button id="login-btn" class="w-full bg-gold text-[#0D1B18] font-black py-3.5 rounded-xl uppercase tracking-widest text-sm hover:bg-gold-dark active:scale-95 transition-all">
                Entrar
            </button>
        </div>

        <p class="text-center text-white/20 text-xs mt-6">Acesso restrito — HorseSmart &copy; 2026</p>
    </div>

    <script>
        if (sessionStorage.getItem('adminToken')) {
            window.location.href = '/admin/dashboard.html';
        }

        document.getElementById('toggle-pwd').addEventListener('click', () => {
            const inp = document.getElementById('password');
            const icon = document.querySelector('#toggle-pwd i');
            if (inp.type === 'password') { inp.type = 'text'; icon.className = 'fa-solid fa-eye-slash text-sm'; }
            else { inp.type = 'password'; icon.className = 'fa-solid fa-eye text-sm'; }
        });

        ['username', 'password'].forEach(id => {
            document.getElementById(id).addEventListener('keydown', e => {
                if (e.key === 'Enter') document.getElementById('login-btn').click();
            });
        });

        document.getElementById('login-btn').addEventListener('click', async () => {
            const username = document.getElementById('username').value.trim();
            const pwd = document.getElementById('password').value.trim();
            const errEl = document.getElementById('error-msg');
            const btn = document.getElementById('login-btn');
            if (!username || !pwd) { errEl.textContent = 'Digite usuário e senha.'; errEl.classList.remove('hidden'); return; }

            btn.textContent = 'Verificando...';
            btn.disabled = true;
            errEl.classList.add('hidden');

            try {
                const res = await fetch('/api/admin/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password: pwd })
                });
                const data = await res.json();
                if (res.ok && data.token) {
                    sessionStorage.setItem('adminToken', data.token);
                    window.location.href = '/admin/dashboard.html';
                } else {
                    errEl.textContent = data.error || 'Credenciais incorretas.';
                    errEl.classList.remove('hidden');
                    btn.textContent = 'Entrar';
                    btn.disabled = false;
                }
            } catch {
                errEl.textContent = 'Erro de conexão. Tente novamente.';
                errEl.classList.remove('hidden');
                btn.textContent = 'Entrar';
                btn.disabled = false;
            }
        });
    </script>
</body>
</html>
