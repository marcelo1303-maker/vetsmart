<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>HORSE SMART | Recuperar Senha</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        'vetsmart-green': '#2D5A4E',
                        'vetsmart-gold': '#D2B48C',
                        'vetsmart-gold-dark': '#C19A6B',
                    }
                }
            }
        }
    </script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;800&display=swap');
        body { font-family: 'Poppins', sans-serif; background-color: #F0F5F3; height: 100vh; display: flex; flex-direction: column; }
        .glass-card { background: rgba(255, 255, 255, 0.7); backdrop-filter: blur(15px); border: 1px solid #2D5A4E; box-shadow: 0 10px 30px rgba(45, 90, 78, 0.1); }
        .input-field { background: rgba(255, 255, 255, 0.9); border: 1px solid rgba(45, 90, 78, 0.1); transition: all 0.3s ease; }
        .input-field:focus { border-color: #D2B48C; outline: none; box-shadow: 0 0 0 3px rgba(210, 180, 140, 0.2); }
    </style>
</head>
<body class="p-6">

    <div class="max-w-md mx-auto w-full mb-8">
        <a href="login.html" class="h-10 w-10 bg-white rounded-full flex items-center justify-center text-vetsmart-green shadow-sm active:scale-90 transition-transform">
            <i class="fa-solid fa-arrow-left"></i>
        </a>
    </div>

    <main class="max-w-md mx-auto w-full space-y-8 flex-1 flex flex-col justify-center">
        <div class="text-center">
            <div class="w-20 h-20 bg-vetsmart-gold/20 rounded-full flex items-center justify-center mx-auto mb-4">
                <i class="fa-solid fa-key text-vetsmart-gold text-3xl"></i>
            </div>
            <h2 class="text-3xl font-black text-vetsmart-green uppercase tracking-tight">Recuperar <span class="text-vetsmart-gold">Acesso</span></h2>
            <p class="text-vetsmart-green/90 text-sm mt-2 font-medium px-4">Insira seu e-mail para receber um link de redefinição de senha.</p>
        </div>

        <div class="glass-card rounded-[2rem] p-8 space-y-6">
            <form id="recovery-form" class="space-y-6">
                <div>
                    <label class="block text-[10px] uppercase tracking-widest font-bold text-vetsmart-green/50 ml-4 mb-1">E-mail Cadastrado</label>
                    <div class="relative">
                        <i class="fa-regular fa-envelope absolute left-4 top-1/2 -translate-y-1/2 text-vetsmart-green/40"></i>
                        <input type="email" id="email" required placeholder="seu@email.com" class="input-field w-full py-4 pl-12 pr-4 rounded-2xl text-vetsmart-green font-medium">
                    </div>
                </div>

                <button type="submit" class="w-full bg-vetsmart-green text-white font-bold py-5 rounded-2xl shadow-xl shadow-green-900/20 uppercase tracking-widest text-sm active:scale-95 transition-transform">
                    Enviar E-mail
                </button>
            </form>
        </div>

        <p class="text-center text-sm font-medium text-vetsmart-green/90 italic">
            Lembrou a senha? <a href="login.html" class="text-vetsmart-green font-bold underline">Voltar para login</a>
        </p>
    </main>
    <script type="module">
        import { auth } from './firebase.js';
        import { sendPasswordResetEmail } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
    
        const form = document.getElementById('recovery-form');
        const submitBtn = form.querySelector('button[type="submit"]');

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value.trim();
            
            if (!email) {
                alert("Por favor, insira um endereço de e-mail.");
                return;
            }

            submitBtn.disabled = true;
            submitBtn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> Enviando...';

            try {
                await sendPasswordResetEmail(auth, email);
                // Por segurança, sempre mostramos uma mensagem de sucesso, 
                // mesmo que o e-mail não esteja cadastrado. Isso evita que atores mal-intencionados
                // descubram quais e-mails estão em nosso sistema.
                alert("Se o seu e-mail estiver cadastrado, você receberá um link para redefinir sua senha em breve.");
                // Atraso para dar tempo ao usuário ler o alerta antes do redirecionamento
                setTimeout(() => { window.location.href = 'login.html'; }, 3000);

            } catch (error) {
                console.error("Erro no envio do e-mail de recuperação:", error);
                // Mesmo em caso de erro, mostramos a mensagem genérica para o usuário.
                // O erro específico é logado no console para depuração.
                alert("Se o seu e-mail estiver cadastrado, você receberá um link para redefinir sua senha em breve.");
                setTimeout(() => { window.location.href = 'login.html'; }, 3000);
            } 
        });
    </script>
</body>
</html>
