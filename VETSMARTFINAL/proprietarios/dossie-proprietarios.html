<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>HORSESMART | Dossiê do Animal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script>
        tailwind.config = {
            theme: { extend: { colors: { 'vetsmart-green': '#2D5A4E', 'vetsmart-gold': '#D2B48C', 'vetsmart-gold-dark': '#C19A6B' } } }
        }
    </script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #F0F5F3; }
        .glass-panel { background: rgba(255,255,255,0.6); -webkit-backdrop-filter: blur(20px); backdrop-filter: blur(20px); border: 1px solid #2D5A4E; box-shadow: 0 8px 32px 0 rgba(31,38,135,0.1); }
        .tab-btn { transition: all .2s; border-radius: 8px; padding: 0.5rem 0.75rem; font-size: 0.8rem; font-weight: 700; color: #2D5A4E; }
        .tab-btn.active { background-color: #2D5A4E; color: white; }
        .nav-active { color: #D2B48C !important; }
    </style>
</head>
<body class="pb-28">

    <header class="bg-vetsmart-green text-white sticky top-0 z-50 shadow-lg">
        <div class="max-w-md mx-auto flex justify-between items-center p-4">
            <a href="cavalos-proprietarios.html" class="text-white/80 hover:text-white"><i class="fa-solid fa-chevron-left text-xl"></i></a>
            <h1 class="font-black text-xl uppercase">Dossiê do <span class="text-vetsmart-gold">Animal</span></h1>
            <div class="w-8"></div>
        </div>
    </header>

    <main class="max-w-md mx-auto px-4 mt-5 space-y-4">

        <div id="loader" class="text-center py-10">
            <i class="fa-solid fa-circle-notch animate-spin text-vetsmart-gold text-3xl"></i>
        </div>

        <div id="content" class="hidden space-y-4">

            <!-- Header do Cavalo -->
            <div class="glass-panel p-6 rounded-3xl text-center">
                <div class="w-16 h-16 rounded-full mx-auto mb-3 flex items-center justify-center" style="background: linear-gradient(135deg, #D2B48C30, #D2B48C60);">
                    <i class="fa-solid fa-horse text-vetsmart-gold text-3xl"></i>
                </div>
                <h2 id="horse-name" class="text-3xl font-black text-vetsmart-green uppercase"></h2>
                <p id="horse-owner" class="text-sm text-vetsmart-green/60 mt-1"></p>
                <p id="horse-id" class="text-xs font-mono bg-vetsmart-gold/20 text-vetsmart-gold-dark px-2 py-1 rounded-md inline-block mt-2"></p>
            </div>

            <!-- Abas -->
            <div class="glass-panel p-3 rounded-2xl">
                <div class="flex gap-1 overflow-x-auto">
                    <button class="tab-btn active flex-shrink-0" data-tab="dados">Dados</button>
                    <button class="tab-btn flex-shrink-0" data-tab="historico">Histórico</button>
                    <button class="tab-btn flex-shrink-0" data-tab="vacinas">Vacinas</button>
                    <button class="tab-btn flex-shrink-0" data-tab="exames">Exames</button>
                </div>
            </div>

            <!-- Tab: Dados -->
            <div id="tab-dados" class="space-y-4">
                <div class="glass-panel p-5 rounded-2xl">
                    <h3 class="font-bold text-vetsmart-green text-sm uppercase tracking-wider border-b border-vetsmart-green/10 pb-2 mb-3">Ficha Técnica</h3>
                    <div id="horse-details" class="grid grid-cols-2 gap-x-4 gap-y-3 text-sm"></div>
                </div>
            </div>

            <!-- Tab: Histórico -->
            <div id="tab-historico" class="hidden space-y-3">
                <div id="historico-list" class="space-y-3">
                    <p class="text-center text-vetsmart-green/40 py-8">Nenhum atendimento encontrado.</p>
                </div>
            </div>

            <!-- Tab: Vacinas -->
            <div id="tab-vacinas" class="hidden space-y-3">
                <div id="vacinas-list" class="space-y-3">
                    <p class="text-center text-vetsmart-green/40 py-8">Nenhuma vacina registrada.</p>
                </div>
            </div>

            <!-- Tab: Exames -->
            <div id="tab-exames" class="hidden space-y-3">
                <div id="exames-list" class="space-y-3">
                    <p class="text-center text-vetsmart-green/40 py-8">Nenhum exame registrado.</p>
                </div>
            </div>

        </div>

        <div id="not-found" class="hidden text-center py-16">
            <i class="fa-solid fa-horse text-vetsmart-gold/30 text-5xl mb-4"></i>
            <p class="text-vetsmart-green/40 font-bold">Animal não encontrado.</p>
            <a href="cavalos-proprietarios.html" class="mt-4 inline-block text-vetsmart-gold font-bold text-sm hover:underline">← Voltar</a>
        </div>

    </main>

    <!-- Bottom Nav -->
    <nav class="fixed bottom-0 left-0 right-0 z-50 bg-vetsmart-green/95 backdrop-blur-md border-t border-white/10">
        <div class="max-w-md mx-auto flex justify-around items-center py-2 px-2">
            <a href="dashboard-proprietarios.html" class="flex flex-col items-center gap-0.5 py-2 px-3 rounded-xl text-white/50 hover:text-vetsmart-gold transition-colors"><i class="fa-solid fa-house text-xl"></i><span class="text-[9px] font-bold uppercase">Início</span></a>
            <a href="cavalos-proprietarios.html" class="flex flex-col items-center gap-0.5 py-2 px-3 rounded-xl nav-active"><i class="fa-solid fa-horse text-xl"></i><span class="text-[9px] font-bold uppercase">Cavalos</span></a>
            <a href="faturas-proprietarios.html" class="flex flex-col items-center gap-0.5 py-2 px-3 rounded-xl text-white/50 hover:text-vetsmart-gold transition-colors"><i class="fa-solid fa-file-invoice text-xl"></i><span class="text-[9px] font-bold uppercase">Faturas</span></a>
            <a href="receitas-proprietarios.html" class="flex flex-col items-center gap-0.5 py-2 px-3 rounded-xl text-white/50 hover:text-vetsmart-gold transition-colors"><i class="fa-solid fa-flask text-xl"></i><span class="text-[9px] font-bold uppercase">Receitas</span></a>
            <a href="financeiro-proprietarios.html" class="flex flex-col items-center gap-0.5 py-2 px-3 rounded-xl text-white/50 hover:text-vetsmart-gold transition-colors"><i class="fa-solid fa-chart-line text-xl"></i><span class="text-[9px] font-bold uppercase">Financeiro</span></a>
        </div>
    </nav>

    <script type="module">
        import { auth, db } from "../firebase.js";
        import { onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { doc, getDoc, collection, query, where, getDocs, orderBy } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const fmt = v => Number(v || 0).toLocaleString('pt-BR', { style: 'currency', currency: 'BRL' });
        const horseId = new URLSearchParams(location.search).get('id');

        let currentUser = null;
        let proprietarioData = null;

        onAuthStateChanged(auth, async (user) => {
            if (!user) { window.location.replace('index-proprietario.html'); return; }
            const snap = await getDoc(doc(db, 'proprietarios', user.uid));
            if (!snap.exists()) { await signOut(auth); window.location.replace('index-proprietario.html'); return; }
            currentUser = user;
            proprietarioData = { uid: user.uid, ...snap.data() };
            if (!horseId) { showNotFound(); return; }
            loadDossie();
        });

        function showNotFound() {
            document.getElementById('loader').classList.add('hidden');
            document.getElementById('not-found').classList.remove('hidden');
        }

        async function loadDossie() {
            const horseSnap = await getDoc(doc(db, 'cavalos', horseId));
            if (!horseSnap.exists()) { showNotFound(); return; }
            const horse = { id: horseSnap.id, ...horseSnap.data() };

            // Verificar que é do proprietário logado
            const cpf = proprietarioData.cpf || '';
            if (horse.cpfProprietario && horse.cpfProprietario !== cpf && horse.uidProprietario !== currentUser.uid) {
                showNotFound(); return;
            }

            document.getElementById('horse-name').textContent = horse.nome_cavalo || horse.nome || '–';
            document.getElementById('horse-owner').textContent = horse.nomeProprietario || proprietarioData.nomeCompleto || '';
            document.getElementById('horse-id').textContent = `ID: ${horse.id.slice(0, 8).toUpperCase()}`;

            // Dados
            const campos = [
                { l: 'Raça', v: horse.raca }, { l: 'Pelagem', v: horse.pelagem },
                { l: 'Sexo', v: horse.sexo }, { l: 'Nascimento', v: horse.data_nascimento ? new Date(horse.data_nascimento).toLocaleDateString('pt-BR') : null },
                { l: 'Microchip', v: horse.microchip }, { l: 'Registro', v: horse.registro_sbmh || horse.registro }
            ].filter(x => x.v);

            function escapeHTML(str) {
                return String(str ?? '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
            }

            document.getElementById('horse-details').innerHTML = campos.map(c =>
                `<div><p class="text-[10px] font-bold text-vetsmart-green/50 uppercase">${escapeHTML(c.l)}</p><p class="font-bold text-vetsmart-green">${escapeHTML(c.v)}</p></div>`
            ).join('') || '<p class="col-span-2 text-vetsmart-green/40 text-sm">Sem dados adicionais.</p>';

            if (horse.observacoes) {
                document.getElementById('horse-details').innerHTML += `<div class="col-span-2"><p class="text-[10px] font-bold text-vetsmart-green/50 uppercase">Observações</p><p class="text-vetsmart-green/70 text-sm">${escapeHTML(horse.observacoes)}</p></div>`;
            }

            // Carregar abas em paralelo
            const [atendSnap, vacinaSnap, exameSnap] = await Promise.all([
                getDocs(query(collection(db, 'atendimentos'), where('horseId', '==', horseId))),
                getDocs(query(collection(db, 'vacinas'), where('horseId', '==', horseId))),
                getDocs(query(collection(db, 'exames'), where('horseId', '==', horseId)))
            ]);

            renderHistorico(atendSnap.docs.map(d => ({ id: d.id, ...d.data() })));
            renderVacinas(vacinaSnap.docs.map(d => ({ id: d.id, ...d.data() })));
            renderExames(exameSnap.docs.map(d => ({ id: d.id, ...d.data() })));

            document.getElementById('loader').classList.add('hidden');
            document.getElementById('content').classList.remove('hidden');
        }

        const statusCls = { pago: 'bg-green-100 text-green-700', pendente: 'bg-red-100 text-red-600', aguardando: 'bg-yellow-100 text-yellow-700', rascunho: 'bg-blue-100 text-blue-600' };
        const statusLabel = { pago: 'Pago', pendente: 'Pendente', aguardando: 'Aguardando', rascunho: 'Rascunho' };

        function renderHistorico(items) {
            const el = document.getElementById('historico-list');
            if (!items.length) return;
            items.sort((a, b) => { const da = a.data?.toDate?.() || new Date(a.data || 0); const db2 = b.data?.toDate?.() || new Date(b.data || 0); return db2 - da; });
            el.innerHTML = items.map(a => {
                const dt = a.data?.toDate?.() ? a.data.toDate().toLocaleDateString('pt-BR') : '–';
                return `<div class="glass-panel p-4 rounded-2xl">
                    <div class="flex justify-between items-start">
                        <div><p class="font-bold text-vetsmart-green">${a.tipo_atendimento || 'Atendimento'}</p><p class="text-xs text-vetsmart-green/50 mt-0.5">${dt}</p></div>
                        <div class="text-right">
                            <p class="font-black text-vetsmart-green">${fmt(a.total_geral)}</p>
                            <span class="text-[10px] font-bold px-2 py-0.5 rounded-full ${statusCls[a.status] || 'bg-gray-100 text-gray-600'}">${statusLabel[a.status] || a.status}</span>
                        </div>
                    </div>
                    ${a.observacoes_clinicas ? `<p class="text-xs text-vetsmart-green/60 mt-2 border-t border-vetsmart-green/10 pt-2">${a.observacoes_clinicas}</p>` : ''}
                </div>`;
            }).join('');
        }

        function renderVacinas(items) {
            const el = document.getElementById('vacinas-list');
            if (!items.length) return;
            el.innerHTML = items.map(v => {
                const dt = v.data?.toDate?.() ? v.data.toDate().toLocaleDateString('pt-BR') : (v.data_vacinacao || '–');
                const prox = v.proxima_dose ? new Date(v.proxima_dose).toLocaleDateString('pt-BR') : null;
                return `<div class="glass-panel p-4 rounded-2xl flex items-center gap-3">
                    <div class="w-10 h-10 rounded-xl bg-vetsmart-gold/10 flex items-center justify-center flex-shrink-0">
                        <i class="fa-solid fa-syringe text-vetsmart-gold"></i>
                    </div>
                    <div class="flex-1">
                        <p class="font-bold text-vetsmart-green">${v.vacina || v.nome || 'Vacina'}</p>
                        <p class="text-xs text-vetsmart-green/50">${dt}${prox ? ` · Próxima: ${prox}` : ''}</p>
                        ${v.lote ? `<p class="text-[10px] text-vetsmart-green/30">Lote: ${v.lote}</p>` : ''}
                    </div>
                </div>`;
            }).join('');
        }

        function renderExames(items) {
            const el = document.getElementById('exames-list');
            if (!items.length) return;
            el.innerHTML = items.map(e => {
                const dt = e.data?.toDate?.() ? e.data.toDate().toLocaleDateString('pt-BR') : '–';
                return `<div class="glass-panel p-4 rounded-2xl flex items-center gap-3">
                    <div class="w-10 h-10 rounded-xl bg-vetsmart-gold/10 flex items-center justify-center flex-shrink-0">
                        <i class="fa-solid fa-microscope text-vetsmart-gold"></i>
                    </div>
                    <div class="flex-1">
                        <p class="font-bold text-vetsmart-green">${e.tipo_atendimento || e.tipo || 'Exame'}</p>
                        <p class="text-xs text-vetsmart-green/50">${dt}</p>
                        ${e.resultado ? `<p class="text-xs text-vetsmart-green/60 mt-1">${e.resultado}</p>` : ''}
                    </div>
                    <span class="text-xs font-bold ${statusCls[e.status] || 'bg-gray-100 text-gray-600'} px-2 py-1 rounded-full">${statusLabel[e.status] || ''}</span>
                </div>`;
            }).join('');
        }

        // ── Abas ──────────────────────────────────────────────────────────────
        document.querySelectorAll('.tab-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                const tab = btn.dataset.tab;
                ['dados','historico','vacinas','exames'].forEach(t => {
                    document.getElementById(`tab-${t}`).classList.toggle('hidden', t !== tab);
                });
            });
        });
    </script>
</body>
</html>
